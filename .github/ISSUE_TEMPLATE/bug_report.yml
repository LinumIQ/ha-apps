name: Bug report
description: Report a problem with one of the add-ons in this repository
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please complete the
        sections below so we can reproduce the problem quickly.
  - type: dropdown
    id: addon
    attributes:
      label: Affected add-on
      options:
        - Caddy mTLS Proxy
    validations:
      required: true
  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      placeholder: "1.1.0"
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "2026.4.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Add-on logs
      render: shell
    validations:
      required: true
