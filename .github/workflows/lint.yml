name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v5

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: caddy-mtls/Dockerfile

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v5

      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          # SC1008: bashio shebang is not recognised by shellcheck
          # SC1083: s6 'finish' scripts are execlineb, not shell
          # SC1091: sourced files use absolute /etc/... paths
          # SC2016: jq programs intentionally use single quotes
          SHELLCHECK_OPTS: -e SC1008,SC1083,SC1091,SC2016 -s bash
        with:
          ignore_paths: ".git"

  yamllint:
    name: YAMLLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v5

      - name: Run YAMLLint
        uses: frenck/action-yamllint@v1.5.0

  addon-config:
    name: Add-on configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v5

      - name: Run Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@v2
        with:
          path: "./caddy-mtls"
