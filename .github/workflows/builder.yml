name: Builder

env:
  BUILD_ARGS: "--test"
  MONITORED_FILES: "build.yaml config.yaml Dockerfile rootfs"

on:
  push:
    branches:
      - main
    paths:
      - "caddy-mtls/**"
      - ".github/workflows/builder.yml"
  pull_request:
    branches:
      - main
    paths:
      - "caddy-mtls/**"
      - ".github/workflows/builder.yml"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: jitterbit/get-changed-files@v1

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Get changed add-ons
        id: changed_addons
        run: |
          declare -a changed_addons
          # On release or workflow_dispatch we always (re)build every add-on.
          if [[ "${{ github.event_name }}" == "release" ]] \
             || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            for addon in ${{ steps.addons.outputs.addons }}; do
              changed_addons+=("\"${addon}\",");
            done
          else
            for addon in ${{ steps.addons.outputs.addons }}; do
              if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon ]]; then
                for file in ${{ env.MONITORED_FILES }}; do
                  if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon/$file ]]; then
                    if [[ ! "${changed_addons[@]}" =~ $addon ]]; then
                      changed_addons+=("\"${addon}\",");
                    fi
                  fi
                done
              fi
            done
          fi
          changed=$(echo ${changed_addons[@]} | rev | cut -c 2- | rev)
          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "addons=[$changed]" >> $GITHUB_OUTPUT
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: init
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64", "armv7", "i386"]
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Check if add-on is published
        id: publish
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "args=--docker-hub ghcr.io/linumiq" >> $GITHUB_OUTPUT
          else
            echo "args=--test" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.addon }} add-on
        uses: home-assistant/builder@2024.08.2
        with:
          args: |
            ${{ steps.publish.outputs.args }} \
            --${{ matrix.arch }} \
            --target /data/${{ matrix.addon }} \
            --image "{arch}-addon-${{ matrix.addon }}" \
            --addon
