---
# Home Assistant Add-on: Caddy mTLS Proxy
# https://developers.home-assistant.io/docs/add-ons/configuration/

name: "Caddy mTLS Proxy"
version: "1.2.5"
slug: "caddy_mtls"
description: >-
  Caddy reverse proxy with mutual TLS (mTLS) client certificate authentication
  and automatic HTTPS via Let's Encrypt.
url: "https://github.com/LinumIQ/ha-apps/tree/main/caddy-mtls"
image: "ghcr.io/linumiq/{arch}-addon-caddy-mtls"

# Supported architectures
# Note: i386 and armv7 were dropped as they are no longer supported by
# Home Assistant OS / Supervisor.
arch:
  - aarch64
  - amd64

# Use S6-overlay v3 from the community add-ons base image
init: false
startup: services

# Port configuration
ports:
  "80/tcp": 80
  "443/tcp": 443

ports_description:
  "80/tcp": "HTTP port for Let's Encrypt HTTP-01 ACME challenge"
  "443/tcp": "HTTPS port with mTLS authentication"

# Ingress configuration for the certificate management web UI (FastAPI app
# served by the cert-mgr s6 service on port 8099 inside the container).
# 8099 is the Supervisor default for ingress_port, so we don't set it
# explicitly (the linter rejects redundant defaults).
ingress: true
ingress_entry: /
panel_icon: mdi:certificate-outline
panel_title: "Caddy mTLS"

# Allow the cert-monitor service to publish sensor entities and persistent
# notifications to Home Assistant via the Supervisor proxy.
hassio_api: true
homeassistant_api: true

# File mappings
map:
  - ssl:rw
  - addon_config:rw

# Add-on options with defaults
options:
  domain: ""
  email: ""
  upstream_host: "homeassistant"
  upstream_port: 8123
  mtls_enabled: true
  ca_country: "AT"
  ca_state: "Styria"
  ca_locality: "Graz"
  ca_organization: "LinumIQ"
  ca_common_name: "Home Assistant mTLS CA"
  client_names:
    - "user"
  client_cert_password: "LinumIQ"
  acme_dns_provider: "none"
  dns_api_token: ""
  log_level: "info"
  cert_expiry_warn_days:
    - 30
    - 14
    - 7
    - 1
  cert_check_interval_hours: 6

# Schema for options validation
schema:
  domain: str
  email: email
  upstream_host: str
  upstream_port: port
  mtls_enabled: bool
  ca_country: str
  ca_state: str
  ca_locality: str
  ca_organization: str
  ca_common_name: str
  client_names:
    - str
  client_cert_password: password
  acme_dns_provider: list(none|cloudflare|route53|hetzner)
  dns_api_token: password?
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  cert_expiry_warn_days:
    - int(1,365)
  cert_check_interval_hours: int(1,168)

# Resource configuration
timeout: 300
