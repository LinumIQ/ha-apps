# Home Assistant Add-on: Caddy mTLS Proxy
# Build configuration for multi-architecture support

build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.19
  amd64: ghcr.io/home-assistant/amd64-base:3.19
  armv7: ghcr.io/home-assistant/armv7-base:3.19
  i386: ghcr.io/home-assistant/i386-base:3.19

args:
  BUILD_ARCH: ${BUILD_ARCH}

labels:
  org.opencontainers.image.title: "Caddy mTLS Proxy"
  org.opencontainers.image.description: "Caddy reverse proxy with mTLS authentication for Home Assistant"
  org.opencontainers.image.source: "https://github.com/LinumIQ/caddy-mtls"
  org.opencontainers.image.licenses: "MIT"
